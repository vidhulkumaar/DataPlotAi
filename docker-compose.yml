version: "3.9"

services:
  # ── PostgreSQL (data warehouse + auth) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: datapilot_postgres
    environment:
      POSTGRES_USER: datapilot
      POSTGRES_PASSWORD: datapilot
      POSTGRES_DB: datapilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Superset caching + celery) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: datapilot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Apache Superset ───────────────────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.1
    container_name: datapilot_superset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: aIlDzizYNyS0u1R0kqGlV9QtrukHIz7NgfTAyxH7nNU
      DATABASE_URL: postgresql+psycopg2://datapilot:datapilot@postgres:5432/superset
      REDIS_URL: redis://redis:6379/0
      SUPERSET_CONFIG_PATH: /app/superset_config.py
    ports:
      - "8088:8088"
    volumes:
      - ./infra/superset_config.py:/app/superset_config.py
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@datapilot.ai --password admin &&
        superset init &&
        gunicorn --bind 0.0.0.0:8088 --workers 4 --timeout 120 'superset.app:create_app()'
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapilot_backend
    depends_on:
      postgres:
        condition: service_healthy
      superset:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@postgres:5432/datapilot
      AUTH_DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@postgres:5432/datapilot_auth
      SUPERSET_BASE_URL: http://superset:8088
      SUPERSET_PUBLIC_URL: http://localhost
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-your_superset_secret_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}
      GEMINI_MODEL: gemini-2.0-flash
      GEMINI_EMBEDDING_MODEL: models/gemini-embedding-001
      GROQ_API_KEY: ${GROQ_API_KEY:-your_groq_api_key_here}
      GROQ_MODEL: llama-3.3-70b-versatile
      USE_GROQ: 'True'
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_here}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://localhost"]'
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/tmp/datapilot/uploads
      - ./backend:/app

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_SUPERSET_URL: http://localhost:8088
    container_name: datapilot_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  upload_data:
