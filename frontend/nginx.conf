server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Superset API — must come BEFORE /api/ to avoid misrouting
    location /superset-api/ {
        proxy_pass http://superset:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 120s;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Superset embedded dashboards
    location /superset/ {
        proxy_pass http://superset:8088/superset/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 120s;
    }

    # Superset static assets (CSS, JS, fonts)
    location /static/ {
        proxy_pass http://superset:8088/static/;
        proxy_set_header Host $host;
    }

    # Superset guest token provider (needed for embedded dashboards)
    location /api/v1/security/guest_token/ {
        proxy_pass http://superset:8088/api/v1/security/guest_token/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Superset login page (GET form + POST auto-login)
    location /login/ {
        proxy_pass http://superset:8088/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    # Superset logout
    location /logout/ {
        proxy_pass http://superset:8088/logout/;
        proxy_set_header Host $host;
    }

    # Superset API v1 (full — for login, CSRF, dashboard info)
    location /api/v1/ {
        proxy_pass http://superset:8088/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    # Superset favicons and other root-level assets
    location /favicon.ico {
        proxy_pass http://superset:8088/favicon.ico;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}